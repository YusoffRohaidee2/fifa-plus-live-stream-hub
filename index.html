<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA+ Live Stream Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #030814;
            --card-bg: rgba(23, 29, 38, 0.6);
            --accent-color: #38b6ff;
            --text-color: #ffffff;
            --text-muted: #a5b1c2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
            background-image: 
                radial-gradient(at 0% 0%, rgba(10, 37, 83, 0.6) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(56, 182, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 50% 100%, rgba(81, 45, 168, 0.2) 0px, transparent 50%);
            background-attachment: fixed;
        }

        /* Styles untuk Pop-up / Modal Pilihan Peranti */
        .device-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(3, 8, 20, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }

        .device-modal {
            background-color: #0c1322;
            border: 1px solid rgba(56, 182, 255, 0.2);
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 20px rgba(56, 182, 255, 0.1);
        }

        .modal-logo {
            height: 45px;
            margin-bottom: 15px;
            object-fit: contain;
        }

        .device-modal h3 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #ffffff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .device-modal p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .device-btn {
            flex: 1;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
        }

        .btn-pc {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .btn-pc:hover {
            background-color: rgba(255, 255, 255, 0.15);
            border-color: white;
        }

        .btn-mobile {
            background-color: var(--accent-color);
            color: #030814;
            border: none;
        }

        .btn-mobile:hover {
            background-color: #219ee6;
            box-shadow: 0 0 15px rgba(56, 182, 255, 0.4);
            transform: translateY(-2px);
        }

        /* Header Style (Dikecilkan) */
        header {
            background-color: rgba(3, 8, 20, 0.75);
            backdrop-filter: blur(15px);
            padding: 10px 4%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.4);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            height: 35px;
            object-fit: contain;
        }

        .hub-title {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(45deg, #ffffff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Layout Utama Dashboard (Lebih Padat) */
        .dashboard-container {
            max-width: 1150px;
            margin: 15px auto;
            padding: 0 15px;
            display: flex;
            gap: 15px;
        }

        /* Bahagian Pemain Video */
        .player-area {
            flex: 2.4;
            display: flex;
            flex-direction: column;
        }

        .player-wrapper {
            background-color: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
        }

        .video-js {
            width: 100% !important;
            height: auto;
            aspect-ratio: 16/9;
        }

        .now-playing {
            margin-top: 12px;
            padding: 6px 2px;
            border-bottom: 2px solid var(--accent-color);
            display: inline-block;
            align-self: flex-start;
        }

        .now-playing span {
            color: var(--text-muted);
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .now-playing h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-top: 1px;
        }

        /* Bahagian Menu Saluran Tepi (Lebih Kompak) */
        .sidebar-area {
            flex: 1;
            background-color: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 100px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .sidebar-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #ff3838;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.7; }
        }

        .channels-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            padding-right: 3px;
        }

        /* Custom Scrollbar */
        .channels-list::-webkit-scrollbar {
            width: 4px;
        }
        .channels-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .channels-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .channels-list::-webkit-scrollbar-thumb:hover {
            background: var(--accent-color);
        }

        .channel-item {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 10px 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .channel-item:hover {
            border-color: var(--accent-color);
            background-color: rgba(56, 182, 255, 0.08);
            transform: translateX(2px);
        }

        .channel-item.active {
            border-color: var(--accent-color);
            background-color: rgba(56, 182, 255, 0.15);
            box-shadow: 0 0 10px rgba(56, 182, 255, 0.1);
        }

        .mini-logo {
            height: 20px;
            object-fit: contain;
        }

        .channel-info {
            display: flex;
            flex-direction: column;
        }

        .channel-title-text {
            font-weight: 600;
            font-size: 0.88rem;
            letter-spacing: 0.2px;
        }

        /* Footer Bersih */
        footer {
            text-align: center;
            margin-top: 25px;
            padding: 15px 0;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.75rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Responsif Skrin */
        @media (max-width: 850px) {
            .dashboard-container {
                flex-direction: column;
                gap: 10px;
            }
            .sidebar-area {
                max-height: none;
            }
            header {
                text-align: center;
                justify-content: center;
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="device-modal-overlay" id="deviceModal">
        <div class="device-modal">
            <img class="modal-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/FIFA%2B_(2025).svg/960px-FIFA%2B_(2025).svg.png" alt="FIFA+ Logo">
            <h3>Are you using Mobile or PC?</h3>
            <p>Please pick your device:</p>
            <div class="btn-container">
                <button class="device-btn btn-pc" id="selectPC">PC / Laptop</button>
                <button class="device-btn btn-mobile" id="selectMobile">Mobile (Phone)</button>
            </div>
        </div>
    </div>

    <header>
        <div class="logo-container">
            <img class="logo-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/FIFA%2B_(2025).svg/960px-FIFA%2B_(2025).svg.png" alt="FIFA+ Logo">
            <div class="hub-title">FIFA+ Live Stream Hub</div>
        </div>
    </header>

    <div class="dashboard-container">
        
        <div class="player-area">
            <div class="player-wrapper">
                <video id="fifa-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="640" height="360">
                    <p class="vjs-no-js">Please activate JavaScript (JS) to watch.</p>
                </video>
            </div>
            <div class="now-playing">
                <span>Active Channels</span>
                <h2 id="current-stream-title">United States (1)</h2>
            </div>
        </div>

        <div class="sidebar-area">
            <div class="sidebar-title">
                <span class="live-dot"></span> CHANNELS
            </div>
            <div class="channels-list" id="channels-container">
                </div>
        </div>

    </div>

    <footer>
        <p>&copy; 2026 FIFA+ Live Stream Hub.</p>
    </footer>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        // Logik Menguruskan Pop-up Pilihan Peranti
        const deviceModal = document.getElementById('deviceModal');
        const selectPC = document.getElementById('selectPC');
        const selectMobile = document.getElementById('selectMobile');

        selectPC.addEventListener('click', () => {
            // Sembunyikan pop-up jika pilih PC
            deviceModal.style.opacity = '0';
            setTimeout(() => {
                deviceModal.style.display = 'none';
            }, 300);
        });

        selectMobile.addEventListener('click', () => {
            // Bawa ke pautan mobile jika pilih Mobile
            window.location.href = "https://yusoffrohaidee2.github.io/fifa-plus-live-stream-hub-mobile/";
        });

        // Data pautan bersih dan susunan mengikut permintaan anda
        const streamData = [
            { id: 1, title: "United States (1)", url: "https://d2w9q46ikgrcwx.cloudfront.net/v1/sysdata_s_p_a_fifa_7/samsungheadend_us/latest/main/hls/playlist.m3u8" },
            { id: 2, title: "United States (2)", url: "https://d2w9q46ikgrcwx.cloudfront.net/v1/master/3722c60a815c199d9c0ef36c5b73da68a62b09d1/cc-of5cbk3sav3w5/v1/sysdata_s_p_a_fifa_7/samsungheadend_us/latest/main/hls/playlist.m3u8" },
            { id: 3, title: "United Kingdom (1)", url: "https://a62dad94.wurl.com/master/f36d25e7e52f1ba8d7e56eb859c636563214f541/UmFrdXRlblRWLWV1X0ZJRkFQbHVzRW5nbGlzaF9ITFM/playlist.m3u8" },
            { id: 4, title: "United Kingdom (2)", url: "https://ba3e2e93.wurl.com/master/f36d25e7e52f1ba8d7e56eb859c636563214f541/U2Ftc3VuZy1nYl9GSUZBUGx1c0VuZ2xpc2hfSExT/playlist.m3u8" }
        ];

        const logoUrl = "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/FIFA%2B_(2025).svg/960px-FIFA%2B_(2025).svg.png";
        
        // Initialize Video.js Player
        const player = videojs('fifa-player', {
            fluid: true,
            autoplay: false,
            controls: true
        });

        const channelsContainer = document.getElementById('channels-container');
        const currentTitleEl = document.getElementById('current-stream-title');

        // Membina elemen senarai secara dinamik
        function renderSidebar() {
            streamData.forEach((stream, index) => {
                const item = document.createElement('div');
                item.classList.add('channel-item');
                if(index === 0) item.classList.add('active');

                item.innerHTML = `
                    <img class="mini-logo" src="${logoUrl}" alt="FIFA+">
                    <div class="channel-info">
                        <div class="channel-title-text">${stream.title}</div>
                    </div>
                `;

                item.addEventListener('click', () => {
                    document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    playStream(stream.url, stream.title);
                });

                channelsContainer.appendChild(item);
            });
        }

        function playStream(url, displayTitle) {
            currentTitleEl.textContent = displayTitle;
            player.src({
                src: url,
                type: 'application/x-mpegURL'
            });
            player.play().catch(err => console.log("Sila klik ikon main manual pada skrin"));
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderSidebar();
            // Mainkan pautan United States (1) secara automatik pada mulanya
            playStream(streamData[0].url, streamData[0].title);
        });
    </script>
</body>
</html>
